<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>관리자 · 월드컵 2026 대시보드</title>
    <style>
      :root {
        --bg: #0e1528;
        --panel: #151d33;
        --panel2: #1b2540;
        --line: rgba(255, 255, 255, 0.1);
        --text: #edf1f8;
        --muted: #8b95ad;
        --blue: #3a74e6;
        --gold: #e9b94a;
        --red: #e63a4c;
        --green: #1fbf75;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          "Pretendard",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          "Noto Sans KR",
          sans-serif;
        font-size: 14px;
        line-height: 1.5;
      }
      .wrap {
        max-width: 820px;
        margin: 0 auto;
        padding: 22px 16px 80px;
      }
      header.top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
      }
      h1 {
        font-size: 20px;
        margin: 0;
      }
      h1 small {
        color: var(--muted);
        font-weight: 400;
        font-size: 13px;
      }
      a.back {
        color: var(--muted);
        text-decoration: none;
        font-size: 13px;
        white-space: nowrap;
      }
      a.back:hover {
        color: var(--text);
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 18px;
        margin-top: 16px;
      }
      .card h2 {
        font-size: 15px;
        margin: 0 0 4px;
      }
      .hint {
        color: var(--muted);
        font-size: 12.5px;
        margin: 0 0 12px;
      }
      input,
      textarea {
        width: 100%;
        background: var(--panel2);
        color: var(--text);
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: 10px 12px;
        font: inherit;
        font-size: 14px;
      }
      input::placeholder,
      textarea::placeholder {
        color: var(--muted);
      }
      textarea {
        min-height: 120px;
        resize: vertical;
        line-height: 1.55;
      }
      button {
        background: var(--blue);
        color: #fff;
        border: 0;
        border-radius: 9px;
        padding: 10px 16px;
        font-weight: 700;
        font-size: 13.5px;
        cursor: pointer;
      }
      button.ghost {
        background: transparent;
        border: 1px solid var(--line);
        color: var(--text);
        font-weight: 600;
      }
      button.sm {
        padding: 6px 11px;
        font-size: 12px;
      }
      button.danger {
        background: transparent;
        color: #ff9aa6;
        border: 1px solid rgba(230, 58, 76, 0.4);
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .row > * {
        flex: 1;
        min-width: 140px;
      }
      .row > button {
        flex: 0 0 auto;
      }
      .msg {
        margin-top: 10px;
        font-size: 13px;
        min-height: 18px;
      }
      .msg.ok {
        color: var(--green);
      }
      .msg.err {
        color: #ff9aa6;
      }
      .pendrow,
      .ovrrow {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 0;
        border-top: 1px solid var(--line);
      }
      .pendrow .en {
        flex: 0 0 42%;
        font-size: 13.5px;
        word-break: break-word;
      }
      .pendrow .en small {
        color: var(--muted);
        display: block;
        font-size: 11px;
      }
      .pendrow input {
        flex: 1;
      }
      .ovrrow .k {
        flex: 1;
        font-size: 13.5px;
        word-break: break-word;
      }
      .ovrrow .k b {
        color: var(--muted);
        font-weight: 400;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 10px;
      }
      .toolbar .count {
        color: var(--muted);
        font-size: 12.5px;
      }
      .empty {
        color: var(--muted);
        font-size: 13px;
        padding: 14px 0;
      }
      .hidden {
        display: none;
      }
      details summary {
        cursor: pointer;
        color: var(--blue);
        font-weight: 700;
        font-size: 13px;
        margin-bottom: 8px;
      }
      code {
        background: rgba(255, 255, 255, 0.08);
        padding: 1px 5px;
        border-radius: 4px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header class="top">
        <h1>관리자 <small>· 월드컵 2026</small></h1>
        <a class="back" href="/">← 대시보드로</a>
      </header>

      <!-- 로그인 -->
      <div class="card" id="loginCard">
        <h2>로그인</h2>
        <p class="hint">관리자 토큰(ADMIN_TOKEN)을 입력하세요.</p>
        <div class="row">
          <input id="token" type="password" placeholder="관리자 토큰" autocomplete="off" />
          <button id="loginBtn">로그인</button>
        </div>
        <div class="msg" id="loginMsg"></div>
      </div>

      <!-- 관리 영역 -->
      <div id="adminArea" class="hidden">
        <!-- 자동 미등록 수집 -->
        <div class="card">
          <h2>미등록 선수 자동 수집</h2>
          <p class="hint">현재 경기·득점·도움에 <b>영어로 뜨는(한글 미등록)</b> 선수를 모아옵니다. 한글만 채우고 한 번에 저장하세요.</p>
          <div class="toolbar">
            <button id="scanBtn">불러오기 / 새로고침</button>
            <span class="count" id="pendCount"></span>
          </div>
          <div id="pendList"><div class="empty">‘불러오기’를 눌러 미등록 선수를 수집하세요.</div></div>
          <div style="margin-top: 12px">
            <button id="savePendBtn" disabled>채운 항목 일괄 저장</button>
          </div>
          <div class="msg" id="pendMsg"></div>
        </div>

        <!-- 수동 일괄 추가 -->
        <div class="card">
          <h2>직접 일괄 추가</h2>
          <p class="hint">한 줄에 한 명씩 · <code>영문 = 한글</code> (구분자: = , | → 또는 탭)</p>
          <textarea id="bulk" placeholder="Folarin Balogun = 폴라린 발로건&#10;Giovanni Reyna → 지오반니 레이나"></textarea>
          <div style="margin-top: 10px"><button id="bulkBtn">일괄 추가</button></div>
          <div class="msg" id="bulkMsg"></div>
        </div>

        <!-- 등록된 오버라이드 -->
        <div class="card">
          <h2>등록된 선수 오버라이드</h2>
          <div class="toolbar">
            <button class="ghost sm" id="reloadOvrBtn">새로고침</button>
            <span class="count" id="ovrCount"></span>
          </div>
          <div id="ovrList"><div class="empty">불러오는 중…</div></div>
        </div>
      </div>
    </div>

    <script>
      // ---------- 공통 ----------
      const $ = (id) => document.getElementById(id);
      let TOKEN = sessionStorage.getItem("wc_admin_token") || "";

      function normName(s) {
        return String(s || "")
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[.\-']/g, " ")
          .replace(/\s+/g, " ")
          .trim();
      }
      function keyCandidates(name) {
        const k = normName(name);
        const set = new Set();
        const add = (s) => {
          if (s) {
            s = s.replace(/\s+/g, " ").trim();
            if (s) {
              set.add(s);
              set.add(s.replace(/ /g, ""));
            }
          }
        };
        add(k);
        const t = k.split(" ").filter(Boolean);
        if (t.length === 2) add(t[1] + " " + t[0]);
        const noInit = t.filter((x) => x.length > 1);
        if (noInit.length && noInit.length !== t.length) add(noInit.join(" "));
        if (t.length >= 2) {
          add(t[0] + " " + t[t.length - 1]);
          add(t[t.length - 1] + " " + t[0]);
          add(t[0]);
          add(t[t.length - 1]);
        }
        if (t.length >= 2) add(t[0][0] + " " + t[t.length - 1]);
        return [...set];
      }
      function parseScorers(str) {
        if (str == null) return [];
        let s = String(str).trim();
        if (!s || s.toLowerCase() === "null") return [];
        s = s.replace(/[{}]/g, "").replace(/["\u201C\u201D\u201E\u201F]/g, " ");
        return s
          .split(",")
          .map((tok) => {
            let raw = tok
              .trim()
              .replace(/^'+|'+$/g, "")
              .trim();
            if (/\(\s*o\.?\s*g\.?\s*\)|\bown\s*goal\b/i.test(raw)) return "";
            let x = raw.replace(/\s+\d[\d'+]*\s*(\([^)]*\))?\s*$/, "").trim();
            x = x.replace(/\s*\([^)]*\)\s*$/, "").trim();
            return x;
          })
          .filter(Boolean);
      }
      async function api(path, opts = {}) {
        const headers = opts.headers || {};
        if (opts.auth) headers["Authorization"] = "Bearer " + TOKEN;
        if (opts.body) headers["Content-Type"] = "application/json";
        const r = await fetch(path, { ...opts, headers });
        const txt = await r.text();
        let data = {};
        try {
          data = txt ? JSON.parse(txt) : {};
        } catch (_) {}
        if (!r.ok) throw new Error(data.error || r.status);
        return data;
      }
      function parseBulk(raw) {
        const map = {};
        let n = 0;
        String(raw || "")
          .split(/\r?\n/)
          .forEach((line) => {
            const m = line.match(/^\s*(.+?)\s*(?:=|→|\||,|\t)\s*(.+?)\s*$/);
            if (m && m[1] && m[2]) {
              map[m[1]] = m[2];
              n++;
            }
          });
        return { map, n };
      }

      // ---------- 한글 보유 DB(KNOWN) 구성 ----------
      let KNOWN = new Set();
      let OVERRIDES = {};
      async function buildKnown() {
        KNOWN = new Set();
        const add = (en) => keyCandidates(en).forEach((c) => KNOWN.add(c));
        // 1) 오버라이드
        try {
          OVERRIDES = await api("/api/players");
        } catch (_) {
          OVERRIDES = {};
        }
        for (const k in OVERRIDES) keyCandidates(k).forEach((c) => KNOWN.add(c));
        // 2) squad.json (player_name_ko 보유분)
        try {
          const sq = await (await fetch("/squad.json", { cache: "no-cache" })).json();
          (sq.players || []).forEach((p) => {
            if (!(p.player_name_ko || "").trim()) return;
            [p.player_name_en, p.name_on_shirt].forEach((en) => en && add(en));
          });
        } catch (_) {}
        // 3) players-ko.json
        try {
          const pk = await (await fetch("/players-ko.json", { cache: "no-cache" })).json();
          for (const en in pk) add(en);
        } catch (_) {}
      }
      const isTranslated = (name) => keyCandidates(name).some((c) => KNOWN.has(c));

      // ---------- 미등록 선수 수집 ----------
      let pendingNames = [];
      async function scanPending() {
        $("pendMsg").textContent = "";
        $("pendList").innerHTML = '<div class="empty">불러오는 중…</div>';
        await buildKnown();
        const names = new Set();
        try {
          const g = await api("/api/games");
          (g.games || []).forEach((m) => {
            parseScorers(m.home_scorers).forEach((n) => names.add(n));
            parseScorers(m.away_scorers).forEach((n) => names.add(n));
          });
        } catch (_) {}
        try {
          const pt = await api("/api/points");
          (pt.players || []).forEach((p) => p.name && names.add(p.name));
        } catch (_) {}
        pendingNames = [...names].filter((n) => n && !/[\uac00-\ud7a3]/.test(n) && !isTranslated(n)).sort((a, b) => a.localeCompare(b));
        renderPending();
      }
      function renderPending() {
        const el = $("pendList");
        $("pendCount").textContent = pendingNames.length ? pendingNames.length + "명 미등록" : "";
        if (!pendingNames.length) {
          el.innerHTML = '<div class="empty">미등록 선수가 없어요. 모두 한글로 표시됩니다 🎉</div>';
          $("savePendBtn").disabled = true;
          return;
        }
        el.innerHTML = pendingNames
          .map(
            (n, i) =>
              `<div class="pendrow"><div class="en">${esc(n)}</div><input data-en="${esc(n)}" id="pend_${i}" placeholder="한글 이름" autocomplete="off" /></div>`,
          )
          .join("");
        $("savePendBtn").disabled = false;
      }
      function esc(s) {
        return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]);
      }
      async function savePending() {
        const map = {};
        let n = 0;
        document.querySelectorAll("#pendList input").forEach((inp) => {
          const ko = inp.value.trim();
          if (ko) {
            map[inp.dataset.en] = ko;
            n++;
          }
        });
        if (!n) {
          msg("pendMsg", "한글을 채운 항목이 없어요.", false);
          return;
        }
        try {
          $("savePendBtn").disabled = true;
          OVERRIDES = await api("/api/players", { method: "POST", auth: true, body: JSON.stringify({ bulk: map }) });
          msg("pendMsg", n + "명 저장됨 ✓", true);
          await scanPending();
          loadOverrides();
        } catch (e) {
          msg("pendMsg", "오류: " + e.message, false);
          $("savePendBtn").disabled = false;
        }
      }

      // ---------- 직접 일괄 추가 ----------
      async function bulkAdd() {
        const { map, n } = parseBulk($("bulk").value);
        if (!n) {
          msg("bulkMsg", "형식: 영문 = 한글 (한 줄에 한 명)", false);
          return;
        }
        try {
          OVERRIDES = await api("/api/players", { method: "POST", auth: true, body: JSON.stringify({ bulk: map }) });
          $("bulk").value = "";
          msg("bulkMsg", n + "명 추가됨 ✓", true);
          loadOverrides();
        } catch (e) {
          msg("bulkMsg", "오류: " + e.message, false);
        }
      }

      // ---------- 오버라이드 목록 ----------
      async function loadOverrides() {
        try {
          OVERRIDES = await api("/api/players");
        } catch (_) {
          OVERRIDES = {};
        }
        const keys = Object.keys(OVERRIDES).sort();
        $("ovrCount").textContent = keys.length + "명";
        const el = $("ovrList");
        if (!keys.length) {
          el.innerHTML = '<div class="empty">등록된 오버라이드가 없어요.</div>';
          return;
        }
        el.innerHTML = keys
          .map(
            (k) =>
              `<div class="ovrrow"><div class="k">${esc(OVERRIDES[k])} <b>· ${esc(k)}</b></div><button class="danger sm" data-rm="${esc(k)}">삭제</button></div>`,
          )
          .join("");
        el.querySelectorAll("button[data-rm]").forEach((b) => {
          b.onclick = async () => {
            try {
              OVERRIDES = await api("/api/players", { method: "POST", auth: true, body: JSON.stringify({ remove: b.dataset.rm }) });
              loadOverrides();
            } catch (e) {
              alert("오류: " + e.message);
            }
          };
        });
      }

      // ---------- 로그인 ----------
      function msg(id, text, ok) {
        const e = $(id);
        e.textContent = text;
        e.className = "msg " + (ok ? "ok" : "err");
      }
      function showAdmin() {
        $("loginCard").classList.add("hidden");
        $("adminArea").classList.remove("hidden");
        loadOverrides();
      }
      async function login(tok) {
        try {
          await api("/api/verify", { method: "POST", headers: { Authorization: "Bearer " + tok } });
          TOKEN = tok;
          sessionStorage.setItem("wc_admin_token", tok);
          showAdmin();
        } catch (e) {
          msg("loginMsg", "로그인 실패: " + e.message, false);
        }
      }

      $("loginBtn").onclick = () => login($("token").value.trim());
      $("token").addEventListener("keydown", (e) => {
        if (e.key === "Enter") login($("token").value.trim());
      });
      $("scanBtn").onclick = scanPending;
      $("savePendBtn").onclick = savePending;
      $("bulkBtn").onclick = bulkAdd;
      $("reloadOvrBtn").onclick = loadOverrides;

      // 세션 토큰이 있으면 자동 진입 시도
      if (TOKEN) login(TOKEN);
    </script>
  </body>
</html>
