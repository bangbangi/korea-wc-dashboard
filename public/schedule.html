<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>월드컵 2026 전체 일정 · 결과 (날짜별 · 조별) | worldcup.bangbangi.com</title>
    <meta
      name="description"
      content="2026 FIFA 월드컵 전체 경기 일정과 결과를 날짜별 · 조별로 정리했습니다. 접속 지역 현지 시간으로 표시되고 실시간 결과가 반영됩니다."
    />
    <meta
      name="keywords"
      content="월드컵 2026 일정, FIFA 월드컵 일정, 2026 월드컵 경기 일정, 월드컵 조별 일정, 월드컵 전체 경기, 월드컵 결과, World Cup 2026 schedule, World Cup fixtures"
    />
    <link rel="canonical" href="https://worldcup.bangbangi.com/schedule" />
    <meta property="og:title" content="월드컵 2026 전체 일정 · 결과" />
    <meta property="og:description" content="날짜별 · 조별 전체 경기 일정과 결과 (현지 시간 · 실시간)" />
    <meta property="og:url" content="https://worldcup.bangbangi.com/schedule" />
    <meta property="og:image" content="https://worldcup.bangbangi.com/og-image.png" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <style>
      :root {
        --bg: #0b1120;
        --surface: #131c33;
        --line: rgba(255, 255, 255, 0.09);
        --text: #edf1f8;
        --muted: #8b95ad;
        --blue: #3a74e6;
        --gold: #e9b94a;
        --live: #ff3355;
        --green: #1fbf75;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          "Pretendard",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          "Noto Sans KR",
          sans-serif;
        font-size: 14px;
        line-height: 1.5;
      }
      .wrap {
        max-width: 860px;
        margin: 0 auto;
        padding: 22px 16px 90px;
      }
      header.top {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }
      h1 {
        font-size: 21px;
        margin: 0;
      }
      a.back {
        color: var(--muted);
        text-decoration: none;
        font-size: 13px;
        white-space: nowrap;
      }
      a.back:hover {
        color: var(--text);
      }
      .topr {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .langsel {
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 4px 8px;
        font-size: 12.5px;
        font-weight: 600;
        cursor: pointer;
      }
      .sub {
        color: var(--muted);
        font-size: 12.5px;
        margin: 4px 0 14px;
      }
      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 18px;
      }
      .filters button {
        background: var(--surface);
        color: var(--muted);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 5px 11px;
        font-size: 12.5px;
        font-weight: 600;
        cursor: pointer;
      }
      .filters button.on {
        background: var(--blue);
        border-color: var(--blue);
        color: #fff;
      }
      .daysec {
        margin-bottom: 22px;
      }
      .dayhead {
        position: sticky;
        top: 0;
        background: var(--bg);
        padding: 8px 2px;
        font-size: 14px;
        font-weight: 800;
        color: var(--gold);
        border-bottom: 1px solid var(--line);
        z-index: 1;
      }
      .dayhead.today::after {
        content: attr(data-today);
        margin-left: 8px;
        font-size: 11px;
        font-weight: 700;
        color: var(--bg);
        background: var(--gold);
        border-radius: 5px;
        padding: 1px 7px;
        vertical-align: 2px;
      }
      .match {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 4px;
        border-bottom: 1px solid var(--line);
      }
      .match:last-child {
        border-bottom: 0;
      }
      .mwhen {
        width: 64px;
        flex: none;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        color: var(--muted);
        line-height: 1.5;
      }
      .mgrp {
        display: inline-block;
        font-size: 9.5px;
        font-weight: 700;
        color: var(--gold);
        background: rgba(233, 185, 74, 0.14);
        border-radius: 4px;
        padding: 0 4px;
        margin-top: 2px;
      }
      .side {
        display: flex;
        align-items: center;
        gap: 7px;
        flex: 1;
        min-width: 0;
        font-size: 13.5px;
      }
      .side.r {
        justify-content: flex-end;
        text-align: right;
      }
      .side .nm {
        white-space: normal;
        word-break: keep-all;
      }
      .fl {
        font-size: 17px;
        line-height: 1;
      }
      .fl-img {
        width: 22px;
        height: 15px;
        object-fit: cover;
        border-radius: 2px;
        vertical-align: middle;
      }
      .score {
        flex: none;
        min-width: 52px;
        text-align: center;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-weight: 800;
        font-size: 15px;
      }
      .score.live {
        color: var(--live);
      }
      .score.up {
        color: var(--muted);
        font-weight: 600;
        font-size: 13px;
      }
      .match.fin .side,
      .match.live .side {
        font-weight: 600;
      }
      .lvdot {
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--live);
        margin-right: 4px;
        animation: blink 1.1s steps(1) infinite;
      }
      @keyframes blink {
        50% {
          opacity: 0.25;
        }
      }
      .empty,
      .loading {
        color: var(--muted);
        padding: 30px 0;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header class="top">
        <h1 id="pgTitle">월드컵 2026 일정 · 결과</h1>
        <div class="topr">
          <select class="langsel" id="langSel" aria-label="언어 / Language"></select>
          <a class="back" id="backLink" href="/">← 대시보드로</a>
        </div>
      </header>
      <div class="sub" id="sub"><span id="subPrefix">날짜별 · 조별 전체 경기 · </span><span id="tznote"></span></div>
      <div class="filters" id="filters"></div>
      <div id="list"><div class="loading">불러오는 중…</div></div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]);

      // ---------- 다국어 (메인과 wc_lang 연동) ----------
      const LANGS = ["ko", "en", "es", "pt", "fr", "ar"];
      const LANG_LABEL = { ko: "한국어", en: "ENG", es: "Español", pt: "Português", fr: "Français", ar: "العربية" };
      const LOCALE = { ko: "ko-KR", en: "en-US", es: "es-ES", pt: "pt-BR", fr: "fr-FR", ar: "ar" };
      let LANG = (function () {
        try {
          const v = localStorage.getItem("wc_lang");
          if (LANGS.includes(v)) return v;
        } catch (_) {}
        const two = (((typeof navigator !== "undefined" && navigator.language) || "") + "").slice(0, 2).toLowerCase();
        return LANGS.includes(two) ? two : "ko";
      })();
      const loc = () => LOCALE[LANG] || "en-US";
      const _dn = {};
      function intlCountry(iso2) {
        if (!iso2) return "";
        const k = loc() + "|" + iso2;
        try {
          if (!_dn[k]) _dn[k] = new Intl.DisplayNames([loc()], { type: "region" });
          return _dn[k].of(String(iso2).toUpperCase()) || "";
        } catch (_) {
          return "";
        }
      }
      const T = {
        ko: {
          title: "월드컵 2026 일정 · 결과",
          back: "← 대시보드로",
          sub: "날짜별 · 조별 전체 경기 · ",
          all: "전체",
          today: "오늘",
          tbd: "미정",
          empty: "표시할 경기가 없어요.",
          loading: "불러오는 중…",
          tzSuffix: " 기준",
          live: "LIVE",
          R32: "32강",
          R16: "16강",
          QF: "8강",
          SF: "4강",
          "3RD": "3·4위전",
          FINAL: "결승",
          gsuf: "조",
        },
        en: {
          title: "World Cup 2026 Schedule & Results",
          back: "← Dashboard",
          sub: "All matches by date & group · ",
          all: "All",
          today: "Today",
          tbd: "TBD",
          empty: "No matches to show.",
          loading: "Loading…",
          tzSuffix: "",
          live: "LIVE",
          R32: "Round of 32",
          R16: "Round of 16",
          QF: "Quarter-finals",
          SF: "Semi-finals",
          "3RD": "Third place",
          FINAL: "Final",
          gsuf: "",
        },
        es: {
          title: "Mundial 2026 · Calendario y Resultados",
          back: "← Panel",
          sub: "Todos los partidos por fecha y grupo · ",
          all: "Todos",
          today: "Hoy",
          tbd: "Por definir",
          empty: "No hay partidos para mostrar.",
          loading: "Cargando…",
          tzSuffix: "",
          live: "EN VIVO",
          R32: "Dieciseisavos",
          R16: "Octavos",
          QF: "Cuartos",
          SF: "Semifinales",
          "3RD": "Tercer puesto",
          FINAL: "Final",
          gsuf: "",
        },
        pt: {
          title: "Copa 2026 · Calendário e Resultados",
          back: "← Painel",
          sub: "Todos os jogos por data e grupo · ",
          all: "Todos",
          today: "Hoje",
          tbd: "A definir",
          empty: "Nenhum jogo para mostrar.",
          loading: "Carregando…",
          tzSuffix: "",
          live: "AO VIVO",
          R32: "16 avos",
          R16: "Oitavas",
          QF: "Quartas",
          SF: "Semifinais",
          "3RD": "Terceiro lugar",
          FINAL: "Final",
          gsuf: "",
        },
        fr: {
          title: "Coupe du monde 2026 · Calendrier et Résultats",
          back: "← Tableau de bord",
          sub: "Tous les matchs par date et groupe · ",
          all: "Tous",
          today: "Aujourd'hui",
          tbd: "À définir",
          empty: "Aucun match à afficher.",
          loading: "Chargement…",
          tzSuffix: "",
          live: "EN DIRECT",
          R32: "16es de finale",
          R16: "8es de finale",
          QF: "Quarts",
          SF: "Demi-finales",
          "3RD": "Petite finale",
          FINAL: "Finale",
          gsuf: "",
        },
        ar: {
          title: "كأس العالم 2026 · الجدول والنتائج",
          back: "← لوحة التحكم",
          sub: "كل المباريات حسب التاريخ والمجموعة · ",
          all: "الكل",
          today: "اليوم",
          tbd: "يحدد لاحقًا",
          empty: "لا توجد مباريات للعرض.",
          loading: "جارٍ التحميل…",
          tzSuffix: "",
          live: "مباشر",
          R32: "دور الـ32",
          R16: "دور الـ16",
          QF: "ربع النهائي",
          SF: "نصف النهائي",
          "3RD": "المركز الثالث",
          FINAL: "النهائي",
          gsuf: "",
        },
      };
      const TX = () => T[LANG] || T.en;
      const nameFor = (t) => {
        if (!t) return "";
        if (LANG === "ko") return t.ko || t.en || "";
        if (LANG === "en") return t.en || "";
        return intlCountry(t.iso2) || t.en || t.ko || "";
      };
      // 경기장별 UTC 오프셋 (2026 6~7월 고정): 동부-4 / 중부-5 / 태평양-7 / 멕시코-6
      const STADIUM_UTC_OFF = {
        1: -6,
        2: -6,
        3: -6,
        4: -5,
        5: -5,
        6: -5,
        7: -4,
        8: -4,
        9: -4,
        10: -4,
        11: -4,
        12: -4,
        13: -7,
        14: -7,
        15: -7,
        16: -7,
      };
      function toUtcISO(s, sid) {
        if (!s) return "";
        const m = String(s).match(/(\d{1,2})\/(\d{1,2})\/(\d{4})\s+(\d{1,2}):(\d{2})/);
        if (!m) return "";
        const off = sid != null && STADIUM_UTC_OFF[String(sid)] != null ? STADIUM_UTC_OFF[String(sid)] : -5;
        return new Date(Date.UTC(+m[3], +m[1] - 1, +m[2], +m[4], +m[5]) - off * 3600 * 1000).toISOString();
      }
      function emojiIso2(iso2) {
        if (!iso2 || iso2.length !== 2) return "";
        const cc = iso2.toUpperCase();
        if (!/^[A-Z]{2}$/.test(cc)) return "";
        return String.fromCodePoint(...[...cc].map((c) => 0x1f1e6 + c.charCodeAt(0) - 65));
      }
      function flagOf(t) {
        if (t && t.flag && /^https?:\/\//.test(t.flag)) return `<img class="fl-img" src="${t.flag}" alt="" loading="lazy">`;
        return `<span class="fl">${(t && t.flag) || emojiIso2(t && t.iso2) || "🏳️"}</span>`;
      }
      const fmtTime = (iso) => {
        const d = new Date(iso);
        return Number.isNaN(+d) ? "" : d.toLocaleTimeString(loc(), { hour: "2-digit", minute: "2-digit" });
      };
      const dayLabel = (iso) => {
        const d = new Date(iso);
        return Number.isNaN(+d) ? "" : d.toLocaleDateString(loc(), { month: "long", day: "numeric", weekday: "short" });
      };
      const dayKey = (iso) => {
        const d = new Date(iso);
        return Number.isNaN(+d) ? "" : d.toLocaleDateString("en-CA");
      };
      function tzLabel() {
        try {
          const p = new Intl.DateTimeFormat(loc(), { timeZoneName: "short" }).formatToParts(new Date()).find((x) => x.type === "timeZoneName");
          return p ? p.value + TX().tzSuffix : "";
        } catch (_) {
          return "";
        }
      }

      let MATCHES = [];
      let GROUPS = [];
      let activeGroup = "all";
      const GLABEL = { R32: "32강", R16: "16강", QF: "8강", SF: "4강", "3RD": "3·4위전", FINAL: "결승" };
      const GORDER = ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J", "K", "L", "R32", "R16", "QF", "SF", "3RD", "FINAL"];
      const groupLabel = (g) => {
        if (!g) return "";
        const x = TX();
        return x[g] || (GORDER.indexOf(g) < 12 ? g + x.gsuf : g); // A~L: 글자(+조), 그 외: 스테이지명
      };
      const groupRank = (g) => {
        const i = GORDER.indexOf(g);
        return i < 0 ? 99 : i;
      };

      let BYID = null,
        KOBYCODE = null;
      async function loadStatic() {
        let teams = [],
          squad = { teams: [] };
        try {
          const [tj, sj] = await Promise.all([
            fetch("/api/teams")
              .then((r) => r.json())
              .catch(() => ({})),
            fetch("/squad.json", { cache: "no-cache" })
              .then((r) => r.json())
              .catch(() => ({ teams: [] })),
          ]);
          teams = tj.teams || tj || [];
          squad = sj || { teams: [] };
        } catch (_) {}
        KOBYCODE = {};
        (squad.teams || []).forEach((t) => {
          if (t.country_code && t.country_ko) KOBYCODE[String(t.country_code).toUpperCase()] = t.country_ko;
        });
        BYID = {};
        teams.forEach((t) => {
          const code = (t.fifa_code || "").toUpperCase();
          BYID[String(t.id)] = { en: t.name_en, ko: KOBYCODE[code] || t.name_en, iso2: t.iso2, flag: t.flag, code };
        });
      }

      let loadedOnce = false;
      async function refreshGames(prefetched) {
        if (!BYID) return;
        let games = null,
          ok = false;
        try {
          const gj = prefetched
            ? await prefetched
            : await fetch("/api/games", { cache: "no-store" })
                .then((r) => (r.ok ? r.json() : null))
                .catch(() => null);
          if (gj) {
            games = gj.games || (Array.isArray(gj) ? gj : []);
            ok = Array.isArray(games);
          }
        } catch (_) {}
        // 실패하거나(네트워크/서버) 일시적으로 비어 있으면: 화면을 비우지 말고 빠르게 재시도
        if (!ok || !games.length) {
          if (!loadedOnce) {
            // 첫 로딩 중 — '경기 없음' 대신 '불러오는 중' 유지
            const ld = document.querySelector("#list .loading");
            if (ld) ld.textContent = TX().loading;
            else $("list").innerHTML = `<div class="loading">${esc(TX().loading)}</div>`;
          } // 이미 로드된 적 있으면 기존 목록 그대로 유지(깜빡임 방지)
          clearTimeout(scheduleNext._t);
          scheduleNext._t = setTimeout(() => refreshGames(), 4000); // 빠른 재시도
          return;
        }
        const nm = (g, side) => {
          const t = BYID[String(g[side + "_team_id"])];
          if (t) return { ...t, tbd: false };
          const en = g[side + "_team_name_en"] || "";
          return { en, ko: KOBYCODE[en.toUpperCase()] || en, iso2: "", flag: "", code: "", tbd: !en };
        };
        const now = Date.now();
        MATCHES = games
          .map((g) => {
            const iso = toUtcISO(g.local_date, g.stadium_id);
            const te = String(g.time_elapsed || "").toLowerCase();
            let fin = String(g.finished).toUpperCase() === "TRUE" || te === "finished";
            let live = !fin && (te === "ht" || te === "live" || /^\d/.test(te));
            // 킥오프 시계 보정: 소스가 라이브를 안 줘도 킥오프 지나면 진행 중(약 3시간 넘으면 종료로 간주)
            if (!fin && !live && iso) {
              const ko = Date.parse(iso);
              if (!Number.isNaN(ko) && now >= ko) {
                if (now < ko + 3.2 * 3600 * 1000) live = true;
                else fin = true;
              }
            }
            return { iso, group: g.group || "", home: nm(g, "home"), away: nm(g, "away"), hs: g.home_score, as: g.away_score, fin, live };
          })
          .filter((m) => m.iso)
          .sort((a, b) => a.iso.localeCompare(b.iso));
        if (!MATCHES.length) {
          // 응답은 왔지만 파싱 후 0건(이례적) — 기존 유지 + 재시도
          if (!loadedOnce) {
            const ld = document.querySelector("#list .loading");
            if (ld) ld.textContent = TX().loading;
          }
          clearTimeout(scheduleNext._t);
          scheduleNext._t = setTimeout(() => refreshGames(), 4000);
          return;
        }
        loadedOnce = true;
        GROUPS = [...new Set(MATCHES.map((m) => m.group).filter(Boolean))].sort((a, b) => groupRank(a) - groupRank(b) || a.localeCompare(b));
        $("tznote").textContent = tzLabel();
        renderFilters();
        render();
        injectJsonLd();
        scheduleNext();
      }

      // 자동 새로고침: 라이브 경기 있으면 더 자주
      function scheduleNext() {
        const live = MATCHES.some((m) => m.live);
        clearTimeout(scheduleNext._t);
        scheduleNext._t = setTimeout(refreshGames, live ? 15000 : 30000);
      }

      function setStaticLabels() {
        const x = TX();
        document.documentElement.lang = LANG;
        document.documentElement.dir = LANG === "ar" ? "rtl" : "ltr"; // 아랍어 RTL
        document.title = x.title + " | worldcup.bangbangi.com";
        const set = (id, v) => {
          const e = $(id);
          if (e) e.textContent = v;
        };
        set("pgTitle", x.title);
        set("backLink", x.back);
        set("subPrefix", x.sub);
        const ld = document.querySelector("#list .loading");
        if (ld) ld.textContent = x.loading;
        const sel = $("langSel");
        if (sel) sel.value = LANG;
      }
      function applyLang(lang) {
        LANG = LANGS.includes(lang) ? lang : "ko";
        try {
          localStorage.setItem("wc_lang", LANG);
        } catch (_) {}
        setStaticLabels();
        render._scrolled = true; // 언어 변경 시 화면 점프 방지
        $("tznote").textContent = tzLabel();
        renderFilters();
        render();
        injectJsonLd();
      }
      function initLangSelect() {
        const sel = $("langSel");
        if (!sel) return;
        sel.innerHTML = LANGS.map((l) => `<option value="${l}" lang="${l}">${LANG_LABEL[l]}</option>`).join("");
        sel.value = LANG;
        sel.addEventListener("change", () => applyLang(sel.value));
      }

      async function load() {
        initLangSelect();
        setStaticLabels();
        // games 를 teams·squad 와 동시에 요청(첫 화면 더 빠르게)
        const gamesP = fetch("/api/games", { cache: "no-store" })
          .then((r) => (r.ok ? r.json() : null))
          .catch(() => null);
        await loadStatic();
        await refreshGames(gamesP);
      }

      // 경기 목록을 구조화 데이터(JSON-LD)로 노출 → AI 답변엔진/검색엔진이 일정을 이해·인용 (GEO)
      function injectJsonLd() {
        try {
          const events = MATCHES.filter((m) => !m.home.tbd && !m.away.tbd).map((m) => ({
            "@type": "SportsEvent",
            name: (m.home.en || m.home.ko) + " vs " + (m.away.en || m.away.ko),
            sport: "Football",
            startDate: m.iso,
            competitor: [
              { "@type": "SportsTeam", name: m.home.en || m.home.ko },
              { "@type": "SportsTeam", name: m.away.en || m.away.ko },
            ],
            superEvent: { "@type": "SportsEvent", name: "2026 FIFA 월드컵" },
          }));
          if (!events.length) return;
          const data = {
            "@context": "https://schema.org",
            "@type": "ItemList",
            name: "2026 FIFA 월드컵 전체 경기 일정",
            numberOfItems: events.length,
            itemListElement: events.map((e, i) => ({ "@type": "ListItem", position: i + 1, item: e })),
          };
          const s = document.createElement("script");
          s.type = "application/ld+json";
          s.id = "ld-schedule";
          s.textContent = JSON.stringify(data);
          const prev = document.getElementById("ld-schedule");
          if (prev) prev.remove();
          document.head.appendChild(s);
        } catch (_) {}
      }

      function renderFilters() {
        const mk = (key, label) => `<button data-g="${key}" class="${activeGroup === key ? "on" : ""}">${label}</button>`;
        $("filters").innerHTML = mk("all", TX().all) + GROUPS.map((g) => mk(g, groupLabel(g))).join("");
        $("filters")
          .querySelectorAll("button")
          .forEach((b) => {
            b.onclick = () => {
              activeGroup = b.dataset.g;
              renderFilters();
              render();
            };
          });
      }

      function render() {
        const list = activeGroup === "all" ? MATCHES : MATCHES.filter((m) => m.group === activeGroup);
        if (!list.length) {
          $("list").innerHTML = `<div class="empty">${esc(TX().empty)}</div>`;
          return;
        }
        const todayK = dayKey(new Date().toISOString());
        // 날짜별 묶기 (날짜 내: 조 → 시간 순)
        const byDay = new Map();
        list.forEach((m) => {
          const k = dayKey(m.iso);
          if (!byDay.has(k)) byDay.set(k, []);
          byDay.get(k).push(m);
        });
        let html = "";
        [...byDay.keys()].sort().forEach((k) => {
          const items = byDay.get(k).sort((a, b) => groupRank(a.group) - groupRank(b.group) || a.iso.localeCompare(b.iso));
          const isToday = k === todayK;
          html += `<div class="daysec"><div class="dayhead ${isToday ? "today" : ""}"${isToday ? ` data-today="${esc(TX().today)}"` : ""}>${esc(dayLabel(items[0].iso))}</div>`;
          html += items
            .map((m) => {
              const cls = m.fin ? "fin" : m.live ? "live" : "up";
              const score = m.live
                ? `<span class="score live">${m.hs ?? 0}-${m.as ?? 0}</span>`
                : m.fin
                  ? `<span class="score">${m.hs ?? 0}-${m.as ?? 0}</span>`
                  : `<span class="score up">${fmtTime(m.iso)}</span>`;
              const grp = m.group ? `<div class="mgrp">${esc(groupLabel(m.group))}</div>` : "";
              const hn = m.home.tbd ? TX().tbd : nameFor(m.home);
              const an = m.away.tbd ? TX().tbd : nameFor(m.away);
              return `<div class="match ${cls}">
                <div class="mwhen">${m.live ? '<span class="lvdot"></span>' + esc(TX().live) : fmtTime(m.iso)}${grp}</div>
                <div class="side">${flagOf(m.home)}<span class="nm">${esc(hn)}</span></div>
                ${score}
                <div class="side r"><span class="nm">${esc(an)}</span>${flagOf(m.away)}</div>
              </div>`;
            })
            .join("");
          html += `</div>`;
        });
        $("list").innerHTML = html;
        // 오늘 섹션으로 스크롤 (최초 1회만 — 자동 새로고침 때는 화면이 안 튀게)
        if (!render._scrolled && activeGroup === "all") {
          const todayEl = document.querySelector(".dayhead.today");
          if (todayEl) {
            todayEl.scrollIntoView({ block: "start" });
            render._scrolled = true;
          }
        }
      }

      load();
    </script>
  </body>
</html>
